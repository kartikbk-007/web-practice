<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            padding: 40px;
            background: #f4f4f4;
        }
        .container{
            background: white;
            padding: 30px;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            text-align: center;
        }
        button{
            padding: 10px 20px;
            margin: 5px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover{
            background: #2980b9;
        }
    </style>
</head>
<body>
    <h1>Day 22 - Password Generator</h1>
    <div class="container">
        <input type="text" id="password" placeholder="Generated password" readonly>
        <button onclick="generatorPassword()">Generator</button>
        <button onclick="copyPassword()">Copy</button>
    </div>
    <script>
        function generatorPassword(){
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
            let password = ""
            for(let i=0;i<12;i++){
                const randomIndex = Math.floor(Math.random()*chars.length)
                password += chars[randomIndex]
            }
            document.getElementById("password").value = password
        }
        function copyPassword(){
            const pass = document.getElementById("password")
            pass.select()
            document.execCommand("copy")
            alert("password copied!")
        }
    </script>
</body>
</html>
