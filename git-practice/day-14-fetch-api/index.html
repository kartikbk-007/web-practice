<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            padding: 40px;
            background: #f4f4f4;
        }
        .card{
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgb(0,0,0,0.1);
        }
        img{
            border-radius: 50%;
            margin-top: 10px;
        }
        button{
            margin-top: 20px;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Day 14 - Random User API</h1>
    <div class="card">
        <img src="" id="avatar" width="100" alt="">
        <h2 id="name"></h2>
        <p id="email"></p>
        <button onclick="getUser()">Load User</button>
    </div>
    <script>
        function getUser(){
            fetch("https://randomuser.me/api/")
            .then(response => response.json())
            .then(data =>{
                const User=data.results[0]
                document.getElementById("name").innerText=User.name.first + " " + User.name.last
                document.getElementById("email").innerText=User.email
                document.getElementById("avatar").src=User.picture.large
            })
        }
        getUser()
    </script>
</body>
</html>
