<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .navbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #222;
            color: white;
        }
        .nav_links{
            display: flex;
            gap: 20px;
        }
        .nav_links a{
            color: white;
            text-decoration: none;
        }
        .nav_links a:hover{
            color: #3498db;
        }
        .hero{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            text-align: center;
            background: linear-gradient(to right,#3498db,#2c3e50);
        }
        .hero-content{
            font-size: 40px;
        }
        .hero button{
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: white;
            color: #2c3e50;
            cursor: pointer;
        }
        .hero button:hover{
            background-color: #ddd;
        }
        .about{
            padding: 60px 20px;
            text-align: center;
        }
        footer{
            background-color: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }
        @media(max-width:768px){
            .navbar{
                flex-direction: column;
                align-items: flex-start;
            }
            .nav_links{
                flex-direction: column;
                margin-top: 10px;
            }
            .hero-content h1{
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>My Website</h2>
        <div class="nav_links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <div class="hero">
        <div class="hero_content">
            <h1>Welcome to my website!</h1>
            <p>Aspiring frontend developer building projects daily.</p>
            <button>View projects</button>
        </div>
    </div>

    <div class="about">
        <h2>About Me</h2>
        <p>I am currently doing a 30_day Frontend challenge and improving my HTML,CSS and Javasript skills every day.</p>
    </div>

    <footer>@ 2026 Kartik | Day 7 mini project completed</footer>
</body>
</html>
